<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0e14">
<link rel="icon" type="image/png" href="/favicon.png">
<title>uConsole — Set Password</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, "SF Pro Text", "Helvetica Neue", system-ui, sans-serif;
  background: #000000; color: #f5f5f7; min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
}
.login-card {
  background: #1c1c1e; border-radius: 16px;
  padding: 1.5rem; width: 90%; max-width: 400px; text-align: center;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
.login-card h1 { font-size: 1.3rem; color: #ffffff; margin-bottom: 0.3rem; }
.login-card .sub { font-size: 0.85rem; color: #8e8e93; margin-bottom: 1.5rem; }
.login-card input {
  width: 100%; padding: 0.75rem 1rem; margin-bottom: 0.75rem;
  background: #000000; border: 1px solid #38383a; border-radius: 10px;
  color: #ffffff; font-size: 1rem; outline: none;
}
.login-card input:focus { border-color: #0a84ff; }
.login-card button {
  width: 100%; padding: 0.75rem; margin-top: 0.5rem;
  background: #30d158; color: #ffffff; border: none; border-radius: 12px;
  font-size: 1rem; font-weight: 600; cursor: pointer;
}
.login-card button:active { opacity: 0.8; }
.error { color: #f85149; font-size: 0.85rem; margin-bottom: 0.75rem; }
</style>
</head>
<body>
<form class="login-card" method="POST" action="/api/set-password">
  <h1>Welcome to uConsole</h1>
  <p class="sub">Set a password to secure your dashboard.</p>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <input type="password" name="password" placeholder="New password" required minlength="4">
  <input type="password" name="confirm" placeholder="Confirm password" required minlength="4">
  <button type="submit">Set Password</button>
</form>
</body>
</html>
